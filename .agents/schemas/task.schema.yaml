schema_name: reverse_vibecoding_task
version: 2
format: yaml_front_matter_markdown
description: >
  Schema for files in .rv/tasks/. Each task file should start with YAML
  front matter that describes a request from the operator to the user, followed
  by optional Markdown notes.
required_fields:
  id:
    type: string
    description: Stable task id matching the file prefix, such as "002_add_feature".
  title:
    type: string
    description: Short request title.
  status:
    type: enum
    allowed_values:
      - proposed
      - active
      - blocked
      - review
      - complete
    description: Current request state.
  request:
    type: string
    description: One-sentence request for the user.
  expected_behavior:
    type: list[string]
    description: Behavior the finished implementation should provide.
  implementation_scope:
    type: list[string]
    description: Boundaries for what the user should inspect or change.
  acceptance_criteria:
    type: list[string]
    description: Conditions the user/operator will use to accept the work.
  evidence_required:
    type: list[string]
    description: Evidence the operator should collect or request if unavailable, such as commands, files, screenshots, or test output.
recommended_fields:
  context:
    type: list[string]
    description: Product or repo context the user should know.
  files_to_inspect:
    type: list[string]
    description: Project-relative files likely relevant to the task.
  files_to_change:
    type: list[string]
    description: Project-relative files the user is expected to edit.
  review_focus:
    type: list[string]
    description: Review criteria the operator should apply when the user returns.
example:
  id: "002_add_feature"
  title: "Add successful PATCH todo test"
  status: active
  request: "Add API coverage for a successful todo title update."
  expected_behavior:
    - "PATCH /todos/{todo_id} returns status 200 for an existing todo."
    - "The response body includes the updated title."
  implementation_scope:
    - "Change backend tests only."
  acceptance_criteria:
    - "A focused test covers the successful update path."
    - "The relevant pytest command passes."
  evidence_required:
    - "Changed file list."
    - "Passing pytest output."
  review_focus:
    - "Correct API behavior."
    - "Test isolation."
    - "Response shape and status code."
