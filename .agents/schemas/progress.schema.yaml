schema_name: reverse_vibecoding_progress
version: 2
format: yaml_front_matter_markdown
description: >
  Schema for files in .rv/progress/. Each progress file should start with YAML
  front matter that summarizes the user's completed work, followed by
  optional Markdown reflection.
required_fields:
  id:
    type: string
    description: Stable progress id matching the related task id, such as "002_add_feature".
  task_id:
    type: string
    description: Id of the task this progress entry summarizes.
  status:
    type: enum
    allowed_values:
      - reviewed
      - needs_revision
      - complete
    description: Outcome after user/operator review.
  change_summary:
    type: string
    description: What the user changed or investigated.
  evidence_reviewed:
    type: list[string]
    description: Files, commands, screenshots, tests, or explanations reviewed.
  acceptance_status:
    type: list[string]
    description: Which acceptance criteria passed, failed, or still need evidence.
  concepts_explained:
    type: list[string]
    description: Abstract concepts the user/operator explained during the task, if any.
  remaining_gaps:
    type: list[string]
    description: Follow-up gaps, risks, or next implementation targets.
recommended_fields:
  tradeoffs_discussed:
    type: list[string]
    description: Design or implementation tradeoffs discussed during review.
  mistakes_or_rework:
    type: list[string]
    description: Mistakes corrected or rework requested.
  next_task:
    type: string
    description: Suggested next task id, if known.
example:
  id: "002_add_feature"
  task_id: "002_add_feature"
  status: complete
  change_summary: "Added API coverage for missing todo update behavior."
  evidence_reviewed:
    - "backend/tests/test_todos.py"
    - "pytest output"
  acceptance_status:
    - "Missing todo update returns 404: passed."
  concepts_explained:
    - "API contract testing."
    - "Failure-path coverage."
  remaining_gaps:
    - "Successful PATCH behavior still needs coverage."
